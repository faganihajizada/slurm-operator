{{- $create := "" -}}
{{- range $key, $loginset := $.Values.loginsets -}}
  {{- $loginset = mergeOverwrite (dict) (deepCopy ($.Values.loginsetDefaults | default dict)) (deepCopy ($loginset | default dict)) -}}
  {{- if $loginset.enabled }}
    {{- $create = true -}}
  {{- end }}{{- /* if $loginset.enabled */}}
{{- end }}{{- /* range $loginset := $.Values.loginsets */}}
{{- range $key, $nodeset := $.Values.nodesets -}}
  {{- $nodeset = mergeOverwrite (dict) (deepCopy ($.Values.nodesetDefaults | default dict)) (deepCopy ($nodeset | default dict)) -}}
  {{- if and $nodeset.enabled ($nodeset | dig "ssh" "enabled" false) }}
    {{- $create = true -}}
  {{- end }}{{- /* and $nodeset.enabled $nodeset.ssh.enabled */}}
{{- end }}{{- /* range $nodeset := $.Values.nodesets */}}
{{- $secretRef := .Values.sssd | dig "secretRef" dict -}}
{{- if and $create (not $secretRef.name) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "slurm.sssdConf.name" . }}
  namespace: {{ include "slurm.namespace" . }}
type: Opaque
stringData:
  {{ include "slurm.sssdConf.key" . -}}: |
    {{- required "sssdConf is required" .Values.sssd.conf | nindent 4 }}
{{- end }}{{- /* if and $create (not .Values.sssd.secretRef) */}}

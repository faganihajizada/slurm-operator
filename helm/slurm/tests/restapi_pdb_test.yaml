---
# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test restapi poddisruptionbudget
templates:
  - restapi/restapi-pdb.yaml
release:
  name: test-release
  namespace: test-namespace
chart:
  version: 1.2.3
  appVersion: 1.2.3
tests:
  - it: should not render when pdb is not enabled
    set:
      restapi:
        replicas: 2
        pdb:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should render with correct metadata, selector and spec when enabled
    set:
      restapi:
        replicas: 2
        pdb:
          enabled: true
          minAvailable: 1
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: test-release-slurm-restapi
      - equal:
          path: metadata.namespace
          value: test-namespace
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: slurmrestd
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: test-release-slurm
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: slurmrestd
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: test-release-slurm
      - equal:
          path: spec.minAvailable
          value: 1

  - it: should set custom minAvailable
    set:
      restapi:
        replicas: 2
        pdb:
          enabled: true
          minAvailable: 2
    asserts:
      - equal:
          path: spec.minAvailable
          value: 2
      - equal:
          path: spec.maxUnavailable
          value: null

  - it: should render numeric zero maxUnavailable when set
    set:
      restapi:
        replicas: 2
        pdb:
          enabled: true
          maxUnavailable: 0
          minAvailable: null
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 0
      - equal:
          path: spec.minAvailable
          value: null

  - it: should override namespace when namespaceOverride is set
    set:
      namespaceOverride: custom-namespace
      restapi:
        replicas: 2
        pdb:
          enabled: true
          minAvailable: 1
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace

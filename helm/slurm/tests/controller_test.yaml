---
suite: test controller
templates:
  - controller/controller-cr.yaml
release:
  name: test-release
  namespace: test-namespace
chart:
  version: 1.2.3
  appVersion: 1.2.3
tests:
  - it: manifest should match snapshot
    set:
      controller:
        slurmctld:
          image:
            tag: v1.2.3
        reconfigure:
          image:
            tag: v1.2.3
    asserts:
      - matchSnapshot: {}
  - it: should set imagePullSecrets
    set:
      imagePullSecrets:
        - name: "docker-secret-1"
        - name: "docker-secret-2"
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: docker-secret-1
      - equal:
          path: spec.template.spec.imagePullSecrets[1].name
          value: docker-secret-2
  - it: should set resourceSettings
    set:
      controller:
        podSpec:
          resources:
            limits:
              cpu: "2"
              memory: "4"
            requests:
              cpu: "1"
              memory: "2"
    asserts:
      - equal:
          path: spec.template.spec.resources
          value:
            limits:
              cpu: "2"
              memory: "4"
            requests:
              cpu: "1"
              memory: "2"
  - it: should add nodeSelector
    set:
      controller:
        podSpec:
          nodeSelector:
            beta.kubernetes.io/os: linux
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector["beta.kubernetes.io/os"]
          value: linux
  - it: should set affinity
    set:
      controller:
        podSpec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: arch
                        operator: In
                        values:
                          - x86_64
    asserts:
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].values[0]
          value: x86_64
  - it: should add tolerations
    set:
      controller:
        podSpec:
          tolerations:
            - key: "test"
              operator: "Exists"
              effect: "NoExecute"
              tolerationSeconds: 6000
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: test
  - it: should add topologySpreadConstraints
    set:
      controller:
        podSpec:
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  foo: bar
    asserts:
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels.foo
          value: bar
  - it: should default the name of a JWKS secret if JWKS is enabled but not provided
    set:
      jwksKeys:
        enabled: true
    asserts:
      - equal:
          path: spec.jwksKeyRef.name
          value: test-release-slurm-auth-jwks
      - equal:
          path: spec.jwksKeyRef.key
          value: jwks.json
  - it: should not use priority class
    set:
      priorityClass:
        enabled: false
        name: slurm-priorityclass
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: ""
  - it: should use priority class
    set:
      priorityClass:
        enabled: true
        name: slurm-priorityclass
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: slurm-priorityclass
  - it: should override priority class
    set:
      priorityClass:
        enabled: false
        name: slurm-priorityclass
      controller:
        podSpec:
          priorityClassName: foo-priorityclass
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: foo-priorityclass
  - it: should set slurmctld livenessProbe exec
    set:
      controller:
        slurmctld:
          livenessProbe:
            exec:
              command:
                - /usr/bin/scontrol
                - ping
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
    asserts:
      - equal:
          path: spec.slurmctld.livenessProbe.exec.command[0]
          value: /usr/bin/scontrol
      - equal:
          path: spec.slurmctld.livenessProbe.exec.command[1]
          value: ping
      - equal:
          path: spec.slurmctld.livenessProbe.initialDelaySeconds
          value: 60
      - equal:
          path: spec.slurmctld.livenessProbe.periodSeconds
          value: 20
      - equal:
          path: spec.slurmctld.livenessProbe.failureThreshold
          value: 3
  - it: should format a string image reference on slurmctld
    set:
      controller.slurmctld.image: registry.example.com/org/slurm:24.11.0
    asserts:
      - equal:
          path: spec.slurmctld.image
          value: registry.example.com/org/slurm:24.11.0
  - it: should format repository and tag on slurmctld
    set:
      controller.slurmctld.image.repository: registry.example.com/org/slurmctld
      controller.slurmctld.image.tag: "24.11.0"
      controller.slurmctld.image.digest: null
    asserts:
      - equal:
          path: spec.slurmctld.image
          value: registry.example.com/org/slurmctld:24.11.0
  - it: should format repository and digest on slurmctld
    set:
      controller.slurmctld.image.repository: registry.example.com/org/slurmctld
      controller.slurmctld.image.digest: sha256:abcdef0123456789
      controller.slurmctld.image.tag: null
    asserts:
      - equal:
          path: spec.slurmctld.image
          value: registry.example.com/org/slurmctld@sha256:abcdef0123456789
  - it: should prefer digest over tag when both are set on slurmctld
    set:
      controller.slurmctld.image.repository: registry.example.com/org/slurmctld
      controller.slurmctld.image.tag: "24.11.0"
      controller.slurmctld.image.digest: sha256:abcdef0123456789
    asserts:
      - equal:
          path: spec.slurmctld.image
          value: registry.example.com/org/slurmctld@sha256:abcdef0123456789
  - it: should fail when string image is empty on slurmctld
    set:
      controller.slurmctld.image: ""
    asserts:
      - failedTemplate:
          errorPattern: image is required
  - it: should fail when repository is missing on slurmctld
    set:
      controller.slurmctld.image.repository: null
      controller.slurmctld.image.tag: "24.11.0"
      controller.slurmctld.image.digest: null
    asserts:
      - failedTemplate:
          errorPattern: image repository is required
  - it: should fail when tag is missing and digest is unset on slurmctld
    set:
      controller.slurmctld.image.repository: registry.example.com/org/slurmctld
      controller.slurmctld.image.tag: null
      controller.slurmctld.image.digest: null
    asserts:
      - failedTemplate:
          errorPattern: image tag is required
  - it: should fail when digest is empty on slurmctld
    set:
      controller.slurmctld.image.repository: registry.example.com/org/slurmctld
      controller.slurmctld.image.digest: ""
      controller.slurmctld.image.tag: null
    asserts:
      - failedTemplate:
          errorPattern: image tag is required
  - it: should format repository and tag on reconfigure
    set:
      controller.reconfigure.image.repository: registry.example.com/org/reconfigure
      controller.reconfigure.image.tag: "24.11.0"
      controller.reconfigure.image.digest: null
    asserts:
      - equal:
          path: spec.reconfigure.image
          value: registry.example.com/org/reconfigure:24.11.0
  - it: should format repository and digest on reconfigure
    set:
      controller.reconfigure.image.repository: registry.example.com/org/reconfigure
      controller.reconfigure.image.digest: sha256:abcdef0123456789
      controller.reconfigure.image.tag: null
    asserts:
      - equal:
          path: spec.reconfigure.image
          value: registry.example.com/org/reconfigure@sha256:abcdef0123456789
  - it: should prefer digest over tag when both are set on reconfigure
    set:
      controller.reconfigure.image.repository: registry.example.com/org/reconfigure
      controller.reconfigure.image.tag: "24.11.0"
      controller.reconfigure.image.digest: sha256:abcdef0123456789
    asserts:
      - equal:
          path: spec.reconfigure.image
          value: registry.example.com/org/reconfigure@sha256:abcdef0123456789
  - it: should format repository and tag on logfile
    set:
      controller.logfile.image.repository: registry.example.com/org/logfile
      controller.logfile.image.tag: "24.11.0"
      controller.logfile.image.digest: null
    asserts:
      - equal:
          path: spec.logfile.image
          value: registry.example.com/org/logfile:24.11.0
  - it: should format repository and digest on logfile
    set:
      controller.logfile.image.repository: registry.example.com/org/logfile
      controller.logfile.image.digest: sha256:abcdef0123456789
      controller.logfile.image.tag: null
    asserts:
      - equal:
          path: spec.logfile.image
          value: registry.example.com/org/logfile@sha256:abcdef0123456789
  - it: should prefer digest over tag when both are set on logfile
    set:
      controller.logfile.image.repository: registry.example.com/org/logfile
      controller.logfile.image.tag: "24.11.0"
      controller.logfile.image.digest: sha256:abcdef0123456789
    asserts:
      - equal:
          path: spec.logfile.image
          value: registry.example.com/org/logfile@sha256:abcdef0123456789
  - it: should leave script refs empty when no inline, vendor, or ref scripts are set
    asserts:
      - isNullOrEmpty:
          path: spec.prologScriptRefs
      - isNullOrEmpty:
          path: spec.epilogScriptRefs
      - isNullOrEmpty:
          path: spec.prologSlurmctldScriptRefs
      - isNullOrEmpty:
          path: spec.epilogSlurmctldScriptRefs
  - it: should reference existing ConfigMaps when *ScriptRefs are set
    set:
      prologScriptRefs:
        - name: external-prolog-cm
      epilogScriptRefs:
        - name: external-epilog-cm
      prologSlurmctldScriptRefs:
        - name: external-prolog-slurmctld-cm
      epilogSlurmctldScriptRefs:
        - name: external-epilog-slurmctld-cm
    asserts:
      - contains:
          path: spec.prologScriptRefs
          content:
            name: external-prolog-cm
      - contains:
          path: spec.epilogScriptRefs
          content:
            name: external-epilog-cm
      - contains:
          path: spec.prologSlurmctldScriptRefs
          content:
            name: external-prolog-slurmctld-cm
      - contains:
          path: spec.epilogSlurmctldScriptRefs
          content:
            name: external-epilog-slurmctld-cm
  - it: should append multiple ConfigMap refs to script refs
    set:
      prologScriptRefs:
        - name: external-prolog-cm-1
        - name: external-prolog-cm-2
    asserts:
      - contains:
          path: spec.prologScriptRefs
          content:
            name: external-prolog-cm-1
      - contains:
          path: spec.prologScriptRefs
          content:
            name: external-prolog-cm-2
  - it: should combine inline scripts and ConfigMap refs additively
    set:
      prologScripts:
        00-setup.sh: |
          #!/usr/bin/env bash
          exit 0
      prologScriptRefs:
        - name: external-prolog-cm
    asserts:
      - contains:
          path: spec.prologScriptRefs
          content:
            name: test-release-slurm-prolog-scripts
      - contains:
          path: spec.prologScriptRefs
          content:
            name: external-prolog-cm
  - it: should combine inline slurmctld scripts and ConfigMap refs additively
    set:
      prologSlurmctldScripts:
        00-pre-alloc.sh: |
          #!/usr/bin/env bash
          exit 0
      prologSlurmctldScriptRefs:
        - name: external-prolog-slurmctld-cm
    asserts:
      - contains:
          path: spec.prologSlurmctldScriptRefs
          content:
            name: test-release-slurm-prolog-slurmctld-scripts
      - contains:
          path: spec.prologSlurmctldScriptRefs
          content:
            name: external-prolog-slurmctld-cm
  - it: should combine vendor (DCGM) and ConfigMap refs additively
    set:
      vendor:
        nvidia:
          dcgm:
            enabled: true
      prologScriptRefs:
        - name: external-prolog-cm
      epilogScriptRefs:
        - name: external-epilog-cm
    asserts:
      - contains:
          path: spec.prologScriptRefs
          content:
            name: test-release-slurm-prolog-dcgm
      - contains:
          path: spec.prologScriptRefs
          content:
            name: external-prolog-cm
      - contains:
          path: spec.epilogScriptRefs
          content:
            name: test-release-slurm-epilog-dcgm
      - contains:
          path: spec.epilogScriptRefs
          content:
            name: external-epilog-cm

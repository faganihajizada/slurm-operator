---
suite: test controller
templates:
  - controller/controller-cr.yaml
release:
  name: test-release
  namespace: test-namespace
chart:
  version: 1.2.3
  appVersion: 1.2.3
tests:
  - it: manifest should match snapshot
    set:
      controller:
        slurmctld:
          image:
            tag: v1.2.3
        reconfigure:
          image:
            tag: v1.2.3
    asserts:
      - matchSnapshot: {}
  - it: should set imagePullSecrets
    set:
      imagePullSecrets:
        - name: "docker-secret-1"
        - name: "docker-secret-2"
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: docker-secret-1
      - equal:
          path: spec.template.spec.imagePullSecrets[1].name
          value: docker-secret-2
  - it: should set resourceSettings
    set:
      controller:
        podSpec:
          resources:
            limits:
              cpu: "2"
              memory: "4"
            requests:
              cpu: "1"
              memory: "2"
    asserts:
      - equal:
          path: spec.template.spec.resources
          value:
            limits:
              cpu: "2"
              memory: "4"
            requests:
              cpu: "1"
              memory: "2"
  - it: should add nodeSelector
    set:
      controller:
        podSpec:
          nodeSelector:
            beta.kubernetes.io/os: linux
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector["beta.kubernetes.io/os"]
          value: linux
  - it: should set affinity
    set:
      controller:
        podSpec:
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: arch
                        operator: In
                        values:
                          - x86_64
    asserts:
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].values[0]
          value: x86_64
  - it: should add tolerations
    set:
      controller:
        podSpec:
          tolerations:
            - key: "test"
              operator: "Exists"
              effect: "NoExecute"
              tolerationSeconds: 6000
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: test
  - it: should add topologySpreadConstraints
    set:
      controller:
        podSpec:
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: topology.kubernetes.io/zone
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  foo: bar
    asserts:
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels.foo
          value: bar
  - it: should default the name of a JWKS secret if JWKS is enabled but not provided
    set:
      jwksKeys:
        enabled: true
    asserts:
      - equal:
          path: spec.jwksKeyRef.name
          value: test-release-slurm-auth-jwks
      - equal:
          path: spec.jwksKeyRef.key
          value: jwks.json
  - it: should not use priority class
    set:
      priorityClass:
        enabled: false
        name: slurm-priorityclass
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: ""
  - it: should use priority class
    set:
      priorityClass:
        enabled: true
        name: slurm-priorityclass
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: slurm-priorityclass
  - it: should override priority class
    set:
      priorityClass:
        enabled: false
        name: slurm-priorityclass
      controller:
        podSpec:
          priorityClassName: foo-priorityclass
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: foo-priorityclass
  - it: should set extraConf from raw string
    set:
      controller:
        extraConf: |
          DebugFlags=Backfill
          SchedulerParameters=permit_job_expansion
    asserts:
      - matchRegex:
          path: spec.extraConf
          pattern: DebugFlags=Backfill
      - matchRegex:
          path: spec.extraConf
          pattern: SchedulerParameters=permit_job_expansion
  - it: should set extraConf from extraConfMap
    set:
      controller:
        extraConfMap:
          MinJobAge: 2
          SlurmctldDebug: debug2
    asserts:
      - exists:
          path: spec.extraConf
      - matchRegex:
          path: spec.extraConf
          pattern: MinJobAge=2
      - matchRegex:
          path: spec.extraConf
          pattern: SlurmctldDebug=debug2
  - it: should set extraConf from extraConfMap with list values
    set:
      controller:
        extraConfMap:
          DebugFlags:
            - Backfill
            - Gang
          SlurmSchedLogLevel: 1
    asserts:
      - exists:
          path: spec.extraConf
      - matchRegex:
          path: spec.extraConf
          pattern: "DebugFlags=Backfill,Gang"
      - matchRegex:
          path: spec.extraConf
          pattern: SlurmSchedLogLevel=1
  - it: should prefer extraConf over extraConfMap when both are set
    set:
      controller:
        extraConf: |
          DebugFlags=Backfill
        extraConfMap:
          MinJobAge: 2
          SlurmctldDebug: debug2
    asserts:
      - matchRegex:
          path: spec.extraConf
          pattern: DebugFlags=Backfill
      - notMatchRegex:
          path: spec.extraConf
          pattern: MinJobAge
      - notMatchRegex:
          path: spec.extraConf
          pattern: SlurmctldDebug
  - it: should set slurmctld livenessProbe exec
    set:
      controller:
        slurmctld:
          livenessProbe:
            exec:
              command:
                - /usr/bin/scontrol
                - ping
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
    asserts:
      - equal:
          path: spec.slurmctld.livenessProbe.exec.command[0]
          value: /usr/bin/scontrol
      - equal:
          path: spec.slurmctld.livenessProbe.exec.command[1]
          value: ping
      - equal:
          path: spec.slurmctld.livenessProbe.initialDelaySeconds
          value: 60
      - equal:
          path: spec.slurmctld.livenessProbe.periodSeconds
          value: 20
      - equal:
          path: spec.slurmctld.livenessProbe.failureThreshold
          value: 3

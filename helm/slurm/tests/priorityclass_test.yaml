# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
---
suite: test secrets
templates:
- priorityclass/priorityclass.yaml
release:
  name: test-release
  namespace: test-namespace
kubernetesProvider:
  scheme:
    "scheduling.k8s.io/v1/PriorityClass":
      gvr:
        version: "v1"
        resource: "priorityclasses"
      namespaced: false
tests:
- it: should not create priority class
  template: priorityclass/priorityclass.yaml
  set:
    priorityClass:
      enabled: false
      create: true
  asserts:
  - hasDocuments:
      count: 0
- it: should not create priority class
  template: priorityclass/priorityclass.yaml
  set:
    priorityClass:
      enabled: true
      create: false
  asserts:
  - hasDocuments:
      count: 0
- it: should create priority class
  template: priorityclass/priorityclass.yaml
  set:
    priorityClass:
      enabled: true
      create: true
  asserts:
  - hasDocuments:
      count: 1

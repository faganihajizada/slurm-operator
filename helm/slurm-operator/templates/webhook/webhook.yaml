{{- include "slurm-operator.webhook.validateModes" . -}}
{{- if .Values.webhook.enabled }}
{{- $caBundle := "" -}}
{{- if .Values.externalCertInjection.enabled -}}
{{- $caBundle = include "slurm-operator.webhook.externalCABundle" . -}}
{{- else if not .Values.certManager.enabled -}}
{{- $durationDays := int 3650 -}}
{{- $ca := genCA .Values.certManager.secretName $durationDays -}}
{{- $cn := (include "slurm-operator.webhook.name" .) -}}
{{- $dnsList := list (printf "%s.%s" (include "slurm-operator.webhook.name" .) (include "slurm-operator.namespace" .)) (printf "%s.%s.svc" (include "slurm-operator.webhook.name" .) (include "slurm-operator.namespace" .)) -}}
{{- $cert := genSignedCert $cn nil $dnsList $durationDays $ca -}}
{{- $caBundle = $ca.Cert | b64enc -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.certManager.secretName }}
  namespace: {{ include "slurm-operator.namespace" . }}
  labels:
    {{- include "slurm-operator.webhook.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc | quote }}
  tls.key: {{ $cert.Key | b64enc | quote }}
  ca.crt: {{ $ca.Cert | b64enc | quote }}
{{- end }}{{- /* mode selection */}}
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "slurm-operator.webhook.name" . }}
  {{- with include "slurm-operator.webhook.validatingAnnotations" . }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}{{- /* with include "slurm-operator.webhook.validatingAnnotations" . */}}
  labels:
    {{- include "slurm-operator.webhook.labels" . | nindent 4 }}
webhooks:
  - name: accounting-v1beta1.kb.io
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
    rules:
      - apiGroups:
          - {{ include "slurm-operator.apiGroup" . }}
        apiVersions:
          - v1beta1
        resources:
          - accountings
        operations:
          - CREATE
          - UPDATE
        scope: Namespaced
    clientConfig:
      {{- with $caBundle }}
      caBundle: {{ . | quote }}
      {{- end }}{{- /* with $caBundle */}}
      service:
        namespace: {{ include "slurm-operator.namespace" . }}
        name: {{ include "slurm-operator.webhook.name" . }}
        path: /validate-slinky-slurm-net-v1beta1-accounting
    failurePolicy: Fail
    matchPolicy: Equivalent
    {{- with .Values.webhook.timeoutSeconds }}
    timeoutSeconds: {{ . }}
    {{- end }}{{- /* with .Values.webhook.timeoutSeconds */}}
    admissionReviewVersions:
      - v1beta1
    sideEffects: None
  - name: controller-v1beta1.kb.io
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
    rules:
      - apiGroups:
          - {{ include "slurm-operator.apiGroup" . }}
        apiVersions:
          - v1beta1
        resources:
          - controllers
        operations:
          - CREATE
          - UPDATE
        scope: Namespaced
    clientConfig:
      {{- with $caBundle }}
      caBundle: {{ . | quote }}
      {{- end }}{{- /* with $caBundle */}}
      service:
        namespace: {{ include "slurm-operator.namespace" . }}
        name: {{ include "slurm-operator.webhook.name" . }}
        path: /validate-slinky-slurm-net-v1beta1-controller
    failurePolicy: Fail
    matchPolicy: Equivalent
    {{- with .Values.webhook.timeoutSeconds }}
    timeoutSeconds: {{ . }}
    {{- end }}{{- /* with .Values.webhook.timeoutSeconds */}}
    admissionReviewVersions:
      - v1beta1
    sideEffects: None
  - name: loginset-v1beta1.kb.io
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
    rules:
      - apiGroups:
          - {{ include "slurm-operator.apiGroup" . }}
        apiVersions:
          - v1beta1
        resources:
          - loginsets
        operations:
          - CREATE
          - UPDATE
        scope: Namespaced
    clientConfig:
      {{- with $caBundle }}
      caBundle: {{ . | quote }}
      {{- end }}{{- /* with $caBundle */}}
      service:
        namespace: {{ include "slurm-operator.namespace" . }}
        name: {{ include "slurm-operator.webhook.name" . }}
        path: /validate-slinky-slurm-net-v1beta1-loginset
    failurePolicy: Fail
    matchPolicy: Equivalent
    {{- with .Values.webhook.timeoutSeconds }}
    timeoutSeconds: {{ . }}
    {{- end }}{{- /* with .Values.webhook.timeoutSeconds */}}
    admissionReviewVersions:
      - v1beta1
    sideEffects: None
  - name: nodeset-v1beta1.kb.io
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
    rules:
      - apiGroups:
          - {{ include "slurm-operator.apiGroup" . }}
        apiVersions:
          - v1beta1
        resources:
          - nodesets
        operations:
          - CREATE
          - UPDATE
        scope: Namespaced
    clientConfig:
      {{- with $caBundle }}
      caBundle: {{ . | quote }}
      {{- end }}{{- /* with $caBundle */}}
      service:
        namespace: {{ include "slurm-operator.namespace" . }}
        name: {{ include "slurm-operator.webhook.name" . }}
        path: /validate-slinky-slurm-net-v1beta1-nodeset
    failurePolicy: Fail
    matchPolicy: Equivalent
    {{- with .Values.webhook.timeoutSeconds }}
    timeoutSeconds: {{ . }}
    {{- end }}{{- /* with .Values.webhook.timeoutSeconds */}}
    admissionReviewVersions:
      - v1beta1
    sideEffects: None
  - name: restapi-v1beta1.kb.io
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
    rules:
      - apiGroups:
          - {{ include "slurm-operator.apiGroup" . }}
        apiVersions:
          - v1beta1
        resources:
          - restapis
        operations:
          - CREATE
          - UPDATE
        scope: Namespaced
    clientConfig:
      {{- with $caBundle }}
      caBundle: {{ . | quote }}
      {{- end }}{{- /* with $caBundle */}}
      service:
        namespace: {{ include "slurm-operator.namespace" . }}
        name: {{ include "slurm-operator.webhook.name" . }}
        path: /validate-slinky-slurm-net-v1beta1-restapi
    failurePolicy: Fail
    matchPolicy: Equivalent
    {{- with .Values.webhook.timeoutSeconds }}
    timeoutSeconds: {{ . }}
    {{- end }}{{- /* with .Values.webhook.timeoutSeconds */}}
    admissionReviewVersions:
      - v1beta1
    sideEffects: None
  - name: token-v1beta1.kb.io
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
    rules:
      - apiGroups:
          - {{ include "slurm-operator.apiGroup" . }}
        apiVersions:
          - v1beta1
        resources:
          - tokens
        operations:
          - CREATE
          - UPDATE
        scope: Namespaced
    clientConfig:
      {{- with $caBundle }}
      caBundle: {{ . | quote }}
      {{- end }}{{- /* with $caBundle */}}
      service:
        namespace: {{ include "slurm-operator.namespace" . }}
        name: {{ include "slurm-operator.webhook.name" . }}
        path: /validate-slinky-slurm-net-v1beta1-token
    failurePolicy: Fail
    matchPolicy: Equivalent
    {{- with .Values.webhook.timeoutSeconds }}
    timeoutSeconds: {{ . }}
    {{- end }}{{- /* with .Values.webhook.timeoutSeconds */}}
    admissionReviewVersions:
      - v1beta1
    sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "slurm-operator.webhook.name" . }}
  {{- with include "slurm-operator.webhook.mutatingAnnotations" . }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}{{- /* with include "slurm-operator.webhook.mutatingAnnotations" . */}}
  labels:
    {{- include "slurm-operator.webhook.labels" . | nindent 4 }}
webhooks:
  - name: podsbinding-v1.kb.io
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            - kube-system
            - {{ include "slurm-operator.namespace" . }}
    admissionReviewVersions:
      - v1
    clientConfig:
      {{- with $caBundle }}
      caBundle: {{ . | quote }}
      {{- end }}{{- /* with $caBundle */}}
      service:
        namespace: {{ include "slurm-operator.namespace" . }}
        name: {{ include "slurm-operator.webhook.name" . }}
        path: /mutate--v1-binding
    failurePolicy: Fail
    matchPolicy: Equivalent
    rules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
        resources:
          - pods/binding
    {{- with .Values.webhook.timeoutSeconds }}
    timeoutSeconds: {{ . }}
    {{- end }}{{- /* with .Values.webhook.timeoutSeconds */}}
    sideEffects: None
{{- end }}{{- /* if .Values.webhook.enabled */}}

---
# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: test operator deployment
templates:
  - operator/deployment.yaml
chart:
  version: 1.2.3
  appVersion: 1.2.3
release:
  name: test-release
  namespace: test-namespace
tests:
  - it: manifest should match snapshot
    asserts:
      - matchSnapshot: {}
  - it: should add nodeSelector
    set:
      operator:
        nodeSelector:
          kubernetes.io/os: linux
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector["kubernetes.io/os"]
          value: linux
  - it: should add affinity
    set:
      operator:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: arch
                      operator: In
                      values:
                        - x86_64
    asserts:
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].values[0]
          value: x86_64
  - it: should add tolerations
    set:
      operator:
        tolerations:
          - key: test
            operator: Exists
            effect: NoExecute
            tolerationSeconds: 6000
    asserts:
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: test
  - it: should add topologySpreadConstraints
    set:
      operator:
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                foo: bar
    asserts:
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].topologyKey
          value: topology.kubernetes.io/zone
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].labelSelector.matchLabels.foo
          value: bar
  - it: should omit topologySpreadConstraints by default
    asserts:
      - notExists:
          path: spec.template.spec.topologySpreadConstraints
  - it: should set imagePullSecrets
    set:
      imagePullSecrets:
        - name: test-docker-secret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets[0].name
          value: test-docker-secret
  - it: should set priorityClassName
    set:
      priorityClassName: test-priority-class
    asserts:
      - equal:
          path: spec.template.spec.priorityClassName
          value: test-priority-class
  - it: should set replica count
    set:
      operator:
        replicas: 42
    asserts:
      - equal:
          path: spec.replicas
          value: 42
  - it: should render profile flag without a positional bool argument
    set:
      operator:
        profile: true
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args[20]
          value: --profile
      - equal:
          path: spec.template.spec.containers[0].args[21]
          value: --profile-addr
      - equal:
          path: spec.template.spec.containers[0].args[23]
          value: --leader-elect
  - it: should set namespace
    set:
      namespaceOverride: custom-namespace
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace
  - it: should set name
    set:
      nameOverride: custom-name
    asserts:
      - equal:
          path: metadata.name
          value: custom-name
  - it: should set securityContext
    set:
      operator:
        securityContext:
          allowPrivilegeEscalation: false
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
  - it: should omit securityContext by default
    asserts:
      - notExists:
          path: spec.template.spec.containers[0].securityContext
  - it: should set podSecurityContext
    set:
      operator:
        podSecurityContext:
          runAsNonRoot: true
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
  - it: should omit podSecurityContext by default
    asserts:
      - notExists:
          path: spec.template.spec.securityContext
  - it: should set serviceAccount
    set:
      operator:
        serviceAccount:
          name: custom-service-account
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: custom-service-account
  - it: should add resources
    set:
      operator:
        resources:
          requests:
            cpu: "100m"
            memory: 128Mi
          limits:
            cpu: "500m"
            memory: 512Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: "100m"
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 128Mi
      - equal:
          path: spec.template.spec.containers[0].resources.limits.cpu
          value: "500m"
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi
  - it: should format a string image reference on operator
    set:
      operator.image: registry.example.com/org/slurm-operator:1.2.3
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.example.com/org/slurm-operator:1.2.3
  - it: should format repository and tag on operator
    set:
      operator.image.repository: registry.example.com/org/slurm-operator
      operator.image.tag: "1.2.3"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.example.com/org/slurm-operator:1.2.3
  - it: should format repository and digest on operator
    set:
      operator.image.repository: registry.example.com/org/slurm-operator
      operator.image.digest: sha256:abcdef0123456789
      operator.image.tag: null
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.example.com/org/slurm-operator@sha256:abcdef0123456789
  - it: should prefer digest over tag when both are set on operator
    set:
      operator.image.repository: registry.example.com/org/slurm-operator
      operator.image.tag: "1.2.3"
      operator.image.digest: sha256:abcdef0123456789
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.example.com/org/slurm-operator@sha256:abcdef0123456789
  - it: should default tag to chart version when tag is unset on operator
    set:
      operator.image.repository: registry.example.com/org/slurm-operator
      operator.image.tag: null
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.example.com/org/slurm-operator:1.2.3
  - it: should default tag to chart version when tag is empty on operator
    set:
      operator.image.repository: registry.example.com/org/slurm-operator
      operator.image.tag: ""
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: registry.example.com/org/slurm-operator:1.2.3
  - it: should fail when string image is empty on operator
    set:
      operator.image: ""
    asserts:
      - failedTemplate:
          errorPattern: image is required
  - it: should fail when repository is missing on operator
    set:
      operator.image.repository: null
      operator.image.tag: "1.2.3"
    asserts:
      - failedTemplate:
          errorPattern: image repository is required

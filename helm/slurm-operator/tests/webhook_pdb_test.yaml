---
suite: test webhook poddisruptionbudget
templates:
  - webhook/poddisruptionbudget.yaml
chart:
  version: 1.2.3
  appVersion: 1.2.3
release:
  name: test-release
  namespace: test-namespace
tests:
  - it: should not render when webhook is disabled
    set:
      webhook:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when pdb is not enabled
    set:
      webhook:
        enabled: true
        pdb:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when replicas is 1
    set:
      webhook:
        enabled: true
        pdb:
          enabled: true
          minAvailable: 1
    asserts:
      - hasDocuments:
          count: 0

  - it: should render with correct metadata and spec when pdb is enabled
    set:
      webhook:
        enabled: true
        replicas: 2
        pdb:
          enabled: true
          minAvailable: 1
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: apiVersion
          value: policy/v1
      - equal:
          path: kind
          value: PodDisruptionBudget
      - equal:
          path: metadata.name
          value: slurm-operator-webhook
      - equal:
          path: metadata.namespace
          value: test-namespace
      - equal:
          path: spec.minAvailable
          value: 1
      - exists:
          path: spec.selector.matchLabels

  - it: should set custom minAvailable
    set:
      webhook:
        enabled: true
        replicas: 4
        pdb:
          enabled: true
          minAvailable: 3
    asserts:
      - equal:
          path: spec.minAvailable
          value: 3
      - exists:
          path: spec.maxUnavailable
        not: true

  - it: should override namespace when namespaceOverride is set
    set:
      namespaceOverride: custom-namespace
      webhook:
        enabled: true
        replicas: 2
        pdb:
          enabled: true
          minAvailable: 1
    asserts:
      - equal:
          path: metadata.namespace
          value: custom-namespace

  - it: should prefer maxUnavailable when both are set
    set:
      webhook:
        enabled: true
        replicas: 3
        pdb:
          enabled: true
          minAvailable: 2
          maxUnavailable: 1
    asserts:
      - exists:
          path: spec.minAvailable
        not: true
      - equal:
          path: spec.maxUnavailable
          value: 1

  - it: should default minAvailable to 1 when neither is set
    set:
      webhook:
        enabled: true
        replicas: 2
        pdb:
          enabled: true
          minAvailable: null
    asserts:
      - exists:
          path: spec.maxUnavailable
        not: true
      - equal:
          path: spec.minAvailable
          value: 1

  - it: should allow maxUnavailable to be set to 0
    set:
      webhook:
        enabled: true
        replicas: 2
        pdb:
          enabled: true
          maxUnavailable: 0
    asserts:
      - exists:
          path: spec.minAvailable
        not: true
      - equal:
          path: spec.maxUnavailable
          value: 0

  - it: should render only maxUnavailable when minAvailable is unset and maxUnavailable is set
    set:
      webhook:
        enabled: true
        replicas: 2
        pdb:
          enabled: true
          minAvailable: null
          maxUnavailable: "25%"
    asserts:
      - exists:
          path: spec.minAvailable
        not: true
      - equal:
          path: spec.maxUnavailable
          value: "25%"

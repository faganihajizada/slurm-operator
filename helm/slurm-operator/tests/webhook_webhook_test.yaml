---
suite: test webhook configuration
templates:
  - webhook/webhook.yaml
chart:
  version: 1.2.3
  appVersion: 1.2.3
release:
  name: test-release
  namespace: test-namespace
tests:
  - it: should not render when webhook is disabled
    set:
      webhook:
        enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: default manifest should match snapshot
    asserts:
      - matchSnapshot: {}

  - it: should honor overridden validating and mutating failurePolicy and matchPolicy values
    set:
      webhook:
        enabled: true
        validating:
          failurePolicy: Ignore
          matchPolicy: Exact
        mutating:
          failurePolicy: Fail
          matchPolicy: Exact
      certManager:
        enabled: false
        secretName: slurm-operator-webhook-ca
    asserts:
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        equal:
          path: webhooks[*].failurePolicy
          value: Ignore
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        equal:
          path: webhooks[*].matchPolicy
          value: Exact
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        equal:
          path: webhooks[0].failurePolicy
          value: Fail
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        equal:
          path: webhooks[0].matchPolicy
          value: Exact

  - it: should honor overridden timeoutSeconds
    set:
      webhook:
        timeoutSeconds: 30
    asserts:
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        equal:
          path: webhooks[*].timeoutSeconds
          value: 30
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        equal:
          path: webhooks[0].timeoutSeconds
          value: 30

  - it: should scope webhooks to configured namespaces
    values:
      - values/webhook_namespaces.yaml
    asserts:
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        equal:
          path: webhooks[*].namespaceSelector.matchExpressions[0]
          value:
            key: kubernetes.io/metadata.name
            operator: In
            values:
              - slurm
              - compute
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        equal:
          path: webhooks[*].namespaceSelector.matchExpressions[1]
          value:
            key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - kube-system
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        equal:
          path: webhooks[0].namespaceSelector.matchExpressions[0]
          value:
            key: kubernetes.io/metadata.name
            operator: In
            values:
              - slurm
              - compute
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        equal:
          path: webhooks[0].namespaceSelector.matchExpressions[1]
          value:
            key: kubernetes.io/metadata.name
            operator: NotIn
            values:
              - kube-system
              - test-namespace

  - it: should inject caBundle and render TLS secret when certManager is disabled
    set:
      certManager:
        enabled: false
        secretName: slurm-operator-webhook-ca
    asserts:
      - documentSelector:
          path: kind
          value: ValidatingWebhookConfiguration
        exists:
          path: webhooks[0].clientConfig.caBundle
      - documentSelector:
          path: kind
          value: MutatingWebhookConfiguration
        exists:
          path: webhooks[0].clientConfig.caBundle
      - documentSelector:
          path: kind
          value: Secret
        equal:
          path: type
          value: kubernetes.io/tls
      - documentSelector:
          path: kind
          value: Secret
        equal:
          path: metadata.name
          value: slurm-operator-webhook-ca
      - documentSelector:
          path: kind
          value: Secret
        exists:
          path: data["tls.crt"]
      - documentSelector:
          path: kind
          value: Secret
        exists:
          path: data["tls.key"]
      - documentSelector:
          path: kind
          value: Secret
        exists:
          path: data["ca.crt"]

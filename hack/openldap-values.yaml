---

replicaCount: 1

image:
  repository: jpgouin/openldap
  tag: 2.6.9-fix
  pullPolicy: IfNotPresent

initSchema:
  image:
    repository: debian
    tag: latest
    pullPolicy: IfNotPresent

replication:
  enabled: false

persistence:
  enabled: true
  size: 1Gi

ltb-passwd:
  enabled: false

customLdifFiles:
  00-root.ldif: |-
    dn: dc=example,dc=org
    objectClass: dcObject
    objectClass: organization
    dc: example
    o: Example Org

  01-units.ldif: |-
    dn: ou=users,dc=example,dc=org
    objectClass: organizationalUnit
    ou: users

    dn: ou=groups,dc=example,dc=org
    objectClass: organizationalUnit
    ou: groups

  02-users.ldif: |-
    dn: cn=users,ou=groups,dc=example,dc=org
    objectClass: top
    objectClass: posixGroup
    cn: users
    gidNumber: 1000
    memberUid: user01

    dn: uid=user01,ou=users,dc=example,dc=org
    objectClass: top
    objectClass: inetOrgPerson
    objectClass: posixAccount
    uid: user01
    cn: User One
    sn: One
    uidNumber: 1000
    gidNumber: 1000
    homeDirectory: /home/user01
    loginShell: /bin/bash
    userPassword: {SSHA}HCGdcTCY/k12yJ9+mWHybk+kMzJzbGlua3k=
